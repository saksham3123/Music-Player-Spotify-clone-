<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/utility.css">
</head>

<body>
    <div class="container flex bg-black">

        <div class="left  bg-black ">
            <div class="home bg-grey m-1 p-1 rounded">
                <div class="close">
                    <img class="invert close" src="./assets/close.svg" alt="close">
                </div>
                <div class="logo flex align-item"><img class="invert" src="./assets/logo.svg" alt="logo"><span
                        style="width: 30px; padding: 10px 10px 10px 2px; font-size: larger;">Spotify</span></div>

                <ul>
                    <li><img class="invert" src="./assets/home.svg" alt="home">Home</li>
                    <li><img class="invert" src="./assets/search.svg" alt="search">Search</li>

                </ul>

            </div>
            <div class="library bg-grey rounded m-1 ">
                <div class="lib">
                    <img class="invert" src="./assets/library.svg" alt="lib">
                    Your Library
                </div>


                <div class="songlist ">
                    <ul>

                    </ul>
                </div>

                <div class="footer ">

                    <div><a href="https://www.spotify.com/in-en/legal/" data-encore-id="textLink">
                            <span data-encore-id="type">Legal</span>
                        </a></div>

                    <div><a href="https://www.spotify.com/in-en/safetyandprivacy/" data-encore-id="textLink">
                            <span data-encore-id="type">Safety &amp; Privacy Center</span>
                        </a></div>

                    <div><a href="https://www.spotify.com/in-en/legal/privacy-policy/" data-encore-id="textLink">
                            <span data-encore-id="type">Privacy Policy</span>
                        </a></div>

                    <div><a href="https://www.spotify.com/in-en/legal/cookies-policy/" data-encore-id="textLink">
                            <span data-encore-id="type">Cookies</span></a>
                    </div>

                    <div><a href="https://www.spotify.com/in-en/legal/privacy-policy/#s3" data-encore-id="textLink">
                            <span data-encore-id="type">About Ads</span></a>
                    </div>

                    <div><a href="https://www.spotify.com/in-en/accessibility/" data-encore-id="textLink">
                            <span data-encore-id="type">Accessibility</span></a>
                    </div>


                </div>
            </div>
        </div>
        <!-- to copy svg click copy then copy element and make a svg img.svg then paste it there if svg not visible then search svg spen and copy xlmns-->
        <div class="right bg-grey rounded  m-1  ">
            <div class="header rounded ">
                <div class="nav ">
                    
                    <img class="invert hamburger" src="./assets/hamburger.svg" alt="hamburger">
                    
                    </svg><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                        color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18" />
                    </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                        color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18" />
                    </svg>

                </div>
                <div class="button">
                    <button class="signupbtn">Sign up</button>
                    <button class="loginbtn">Log in</button>

                </div>

            </div>

            <div class="spotifyPlaylist p-1">
                <h1>Spotify Playlist</h1>
                <div class="cardcontainer flex p-1">
                    
                </div>



            </div>
        </div>
    </div>

    <div class="playbar bg-black ">
        <div class="songinfo">

        </div>
        <div class="songbutton">
            <img id="previous" class="invert" src="./assets/previous.svg" alt="previous">
            <img id="play" class="invert" src="./assets/play.svg" alt="play">
            <img id="next" class="invert" src="./assets/next.svg" alt="next">

        </div>

          <div class="volume">
                   
            
            <div class="songtime">
                
            </div>

            <div class="vol">

            <img width="25px" class="invert" src="assets/volume.svg" alt="volume">
            
            <div class="range">
            <input type="range" name="seekbar" id="volumebar">
            </div>

            </div>
            
        </div>



    </div>
    <script src="./js/script.js"></script>
</body>

</html>
